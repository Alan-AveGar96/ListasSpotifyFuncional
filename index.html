<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Descargador Spotify</title>
</head>
<body style="background:#121212;color:white;text-align:center;padding-top:50px;">

    <h1>Descargador Spotify</h1>

    <input type="text" id="link" placeholder="Pega link" style="padding:10px;width:300px;">
    <br><br>
    <button onclick="procesar()" style="padding:10px 20px;">PROCESAR</button>

    <div id="status" style="margin-top:20px;color:#1DB954;"></div>

    <script>
        const BASE_URL = window.location.origin;

        function procesar() {
            const url = document.getElementById('link').value;
            const status = document.getElementById('status');

            if (!url) return alert("Pega un link");

            status.innerText = "Conectando...";

            const ev = new EventSource(`${BASE_URL}/playlist-progress?url=${encodeURIComponent(url)}`);

            ev.onmessage = (e) => {
                const data = JSON.parse(e.data);
                status.innerText = data.status;

                if (data.status === "Completado") {
                    ev.close();
                    window.location.href = `${BASE_URL}/get-zip?file=${data.file}`;
                }
            };

            ev.onerror = () => {
                status.innerText = "Error de conexión";
                ev.close();
            };
        }
    </script>

</body>
</html>
