<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Descargador Pro</title>
    <style>
        .spotify-box { 
            background: #121212; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 40px;
            border: 2px solid #1DB954; 
            border-radius: 15px;
            max-width: 500px;
            margin: 20px auto;
        }
        .spotify-box h1 { color: white; margin-bottom: 20px; }
        .spotify-box input { 
            padding: 12px; 
            width: 80%; 
            border-radius: 5px; 
            border: none; 
            margin-bottom: 10px;
        }
        .spotify-box button { 
            padding: 12px 25px; 
            background: #1DB954; 
            color: white; 
            border: none; 
            border-radius: 5px;
            cursor: pointer; 
            font-weight: bold;
        }
        .spotify-box button:hover { background: #1ed760; }
        #status { margin-top:20px; color: #1DB954; font-weight: bold; }
    </style>
</head>
<body>
    <div class="spotify-box">
        <h1>Descargador Spotify</h1>
        <input type="text" id="link" placeholder="Pega link de Spotify o YouTube">
        <br>
        <button onclick="procesar()">¡PROCESAR!</button>
        <div id="status"></div>
    </div>

    <script>
        // ⚠️ CAMBIA ESTA URL POR LA DE TU RAILWAY
        const BASE_URL = "https://listasspotifyfuncional-production.up.railway.app";

        function procesar() {
            const url = document.getElementById('link').value;
            const status = document.getElementById('status');
            if(!url) return alert("Por favor, pega un link válido");
            
            status.innerText = "Conectando con el servidor...";
            
            // Usamos la URL de Railway para los eventos de progreso
            const ev = new EventSource(`${BASE_URL}/playlist-progress?url=${encodeURIComponent(url)}`);
            
            ev.onmessage = (e) => {
                const data = JSON.parse(e.data);
                status.innerText = data.status;

                if(data.status === "Completado") {
                    ev.close();
                    status.innerText = "¡Descarga lista! Iniciando transferencia...";
                    // Redirigimos a la descarga en el servidor de Railway
                    window.location.href = `${BASE_URL}/get-zip?file=${data.file}`;
                }
            };

            ev.onerror = () => {
                status.innerText = "Error de conexión. Reintenta en unos segundos.";
                ev.close();
            };
        }
    </script>
</body>
</html>
